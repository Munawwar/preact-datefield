<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preact Datefield Example</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap">
  <link rel="stylesheet" href="../lib/PreactDatefield.css">
  <style>
    :root {
      --text-color: #222;
      --bg-color: #fff;
      --border-color: #ccc;
      --input-bg-color: #fff;
      --hover-bg-color: rgba(0, 0, 0, 0.1);
    }

    html[data-theme="dark"] {
      --text-color: #e0e0e0;
      --bg-color: #222;
      --border-color: #666;
      --input-bg-color: #444;
      --hover-bg-color: rgba(255, 255, 255, 0.1);
    }

    body {
      font-family: 'Roboto', sans-serif;
      padding: 20px;
      transition: background-color 0.3s, color 0.3s;
      min-width: 320px;
      max-width: 600px;
      margin: 0 auto;
      background-color: var(--bg-color);
      color: var(--text-color);
    }

    #root {
      width: 100%;
    }

    label {
      display: block;
      margin: 5px 0;
      font-weight: 700;
      font-size: larger;
    }

    .theme-selector {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 20px;
    }

    .theme-selector label {
      margin-right: 10px;
      font-size: 16px;
      font-weight: normal;
    }

    .theme-selector select {
      padding: 6px 12px;
      border-radius: 4px;
      border: 1px solid var(--border-color);
      background-color: var(--input-bg-color);
      color: var(--text-color);
      font-size: 14px;
      cursor: pointer;
    }

    button, p {
      color: var(--text-color);
    }

    button {
      background-color: var(--input-bg-color);
      border-color: var(--border-color);
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background-color: var(--hover-bg-color);
    }

    .value-display {
      font-size: 0.85rem;
      color: #666;
      margin: 4px 0 16px 0;
      font-family: monospace;
    }

    .section {
      margin-bottom: 32px;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border-color);
      margin: 24px 0;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "preact": "https://esm.sh/preact@10?dev",
        "preact/hooks": "https://esm.sh/preact@10/hooks?dev",
        "preact/jsx-runtime": "https://esm.sh/preact@10/jsx-runtime?dev",
        "preact/compat": "https://esm.sh/preact@10/compat?dev",
        "htm": "https://esm.sh/htm?dev",
        "@popperjs/core": "https://esm.sh/@popperjs/core@2?dev"
      }
    }
  </script>
</head>

<body>
  <h2>Preact Datefield Example</h2>

  <div class="theme-selector">
    <label for="theme-select">Theme:</label>
    <select id="theme-select">
      <option value="system">System default</option>
      <option value="light" selected>Light mode</option>
      <option value="dark">Dark mode</option>
    </select>
  </div>

  <div id="root"></div>

  <script type="module">
    import './example.js';

    document.documentElement.setAttribute('data-theme', 'light');

    document.getElementById('theme-select').addEventListener('change', (e) => {
      const themeValue = e.target.value;
      document.documentElement.removeAttribute('data-theme');
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (themeValue === 'system') {
        if (prefersDark) document.documentElement.setAttribute('data-theme', 'dark');
      } else if (themeValue === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
      }
      window.dispatchEvent(new CustomEvent('theme-change', {
        detail: { theme: themeValue, darkMode: themeValue === 'dark' || (themeValue === 'system' && prefersDark) }
      }));
    });

    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
        const themeSelect = document.getElementById('theme-select');
        if (themeSelect.value === 'system') {
          document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
          window.dispatchEvent(new CustomEvent('theme-change', {
            detail: { theme: 'system', darkMode: e.matches }
          }));
        }
      });
    }
  </script>
</body>

</html>
